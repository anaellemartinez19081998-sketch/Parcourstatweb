{% extends "base.html" %}

{% block content %}

<div class="container d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="text-center p-5 shadow-lg rounded-4 bg-white" style="max-width: 600px; border-top: 5px solid #dc3545;">
        
        <div class="mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="#dc3545" class="bi bi-exclamation-triangle-fill" viewBox="0 0 16 16">
                <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
            </svg>
        </div>

        <h1 class="display-5 fw-bold mb-3" style="color: #343a40;">Oups !</h1>
        
        <p class="lead mb-4 text-muted">
            Un problème est survenu lors de la récupération des données de la carte.
        </p>

        <div class="p-3 mb-4 rounded-3" style="background-color: #f8f9fa; border-left: 4px solid #dee2e6;">
            <p class="mb-0 small">
                L'erreur a été enregistrée. Nos équipes techniques vont pouvoir l'analyser.
            </p>
        </div>

        <div class="d-flex justify-content-center gap-3">
            <a href="{{ url_for('main.index') }}" class="btn btn-dark px-4 py-2 rounded-pill">
                Retour à l'accueil
            </a>
            <button onclick="window.location.reload();" class="btn btn-outline-secondary px-4 py-2 rounded-pill">
                Réessayer
            </button>
        </div>

        <hr class="my-4">

        <div class="contact-section">
            <p class="mb-1 text-muted">Besoin d'aide ?</p>
            <a href="parcourstat@gmail.com" class="text-decoration-none fw-bold" style="color: #dc3545;">
                N'hésitez pas à nous contacter !
            </a>
        </div>
    </div>
</div>

{% endblock %}
